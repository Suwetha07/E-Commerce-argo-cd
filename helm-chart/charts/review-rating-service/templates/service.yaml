apiVersion: v1
kind: Service
metadata:
  name: review-rating-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: review-rating-service
  ports:
  - port: 3012
    targetPort: 3012
---
apiVersion: v1
kind: Service
metadata:
  name: review-rating-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: review-rating-service
  ports:
  - port: 80
    targetPort: 3012
  type: ClusterIP
