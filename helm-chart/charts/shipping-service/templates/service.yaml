apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: shipping-service
  ports:
  - port: 3011
    targetPort: 3011
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: shipping-service
  ports:
  - port: 80
    targetPort: 3011
  type: ClusterIP
