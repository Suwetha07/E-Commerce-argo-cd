apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: order-service
  ports:
  - port: 3008
    targetPort: 3008
---
apiVersion: v1
kind: Service
metadata:
  name: order-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: order-service
  ports:
  - port: 80
    targetPort: 3008
  type: ClusterIP
