apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: search-service
  ports:
  - port: 3004
    targetPort: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: search-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: search-service
  ports:
  - port: 80
    targetPort: 3004
  type: ClusterIP
