apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: cart-service
  ports:
  - port: 3006
    targetPort: 3006
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: cart-service
  ports:
  - port: 80
    targetPort: 3006
  type: ClusterIP
