apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: inventory-service
  ports:
  - port: 3005
    targetPort: 3005
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: inventory-service
  ports:
  - port: 80
    targetPort: 3005
  type: ClusterIP
