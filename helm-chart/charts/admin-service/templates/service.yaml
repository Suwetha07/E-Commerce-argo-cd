apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: admin-service
  ports:
  - port: 3014
    targetPort: 3014
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: admin-service
  ports:
  - port: 80
    targetPort: 3014
  type: ClusterIP
