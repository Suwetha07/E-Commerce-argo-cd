apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: invoice-service
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    blueGreen:
      activeService: invoice-service
      previewService: invoice-service-preview
      autoPromotionEnabled: false
  selector:
    matchLabels:
      app: invoice-service
  template:
    metadata:
      labels:
        app: invoice-service
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Waiting for MongoDB..."; until nc -z mongodb 27017; do sleep 2; done; echo "MongoDB is ready!"']
      containers:
      - name: invoice-service
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 3010
        env:
        - name: PORT
          value: '3010'
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: clahanstore-config
              key: ORDER_SERVICE_URL
        - name: PAYMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: clahanstore-config
              key: PAYMENT_SERVICE_URL
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: clahanstore-secrets
              key: MONGO_URI_INVOICE
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3010
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3010
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
