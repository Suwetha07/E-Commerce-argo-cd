apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: auth-service
  ports:
  - port: 3002
    targetPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: auth-service
  ports:
  - port: 80
    targetPort: 3002
  type: ClusterIP
