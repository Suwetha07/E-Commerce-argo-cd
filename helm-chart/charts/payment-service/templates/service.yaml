apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: {{ .Values.global.namespace }}
spec:
  clusterIP: None
  selector:
    app: payment-service
  ports:
  - port: 3009
    targetPort: 3009
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service-preview
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: payment-service
  ports:
  - port: 80
    targetPort: 3009
  type: ClusterIP
