apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend-ui
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    blueGreen:
      activeService: frontend-ui
      previewService: frontend-ui-preview
      autoPromotionEnabled: false
  selector:
    matchLabels:
      app: frontend-ui
  template:
    metadata:
      labels:
        app: frontend-ui
    spec:
      containers:
      - name: frontend-ui
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
